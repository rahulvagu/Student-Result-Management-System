<!DOCTYPE html>
<html>
<head>
    <title>Student Result Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">📘 Student Result Lookup</h2>
        <form action="/result" method="post" class="form-inline">
            <div class="mb-3">
                <label for="student_id" class="form-label">Enter Student ID</label>
                <input type="text" name="student_id" id="student_id" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary mt-2">View Result</button>
        </form>
    </div>
</body>
</html>
